name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  checks:
    name: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Check for CRLF line endings
        run: |
          bad=$(git ls-files | xargs grep -lU $'\r' 2>/dev/null || true)
          if [ -n "$bad" ]; then
            echo "CRLF line endings found:"
            echo "$bad"
            exit 1
          fi

      - name: Check file sizes (100 KB limit)
        run: |
          LIMIT=102400
          failed=0
          while IFS= read -r f; do
            size=$(stat -c%s "$f" 2>/dev/null || echo 0)
            if [ "$size" -gt "$LIMIT" ]; then
              echo "FAIL ($size bytes): $f"
              failed=1
            fi
          done < <(git ls-files)
          exit $failed

  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system graphviz (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y graphviz

      - name: Install system graphviz (Windows)
        if: runner.os == 'Windows'
        run: choco install graphviz --no-progress

      - name: Add graphviz to PATH (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo "C:/Program Files/Graphviz/bin" >> "$GITHUB_PATH"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v
