name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [develop, main]

jobs:
  checks:
    name: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Check for CRLF line endings
        run: |
          bad=$(git ls-files | xargs grep -lU $'\r' 2>/dev/null || true)
          if [ -n "$bad" ]; then
            echo "CRLF line endings found:"
            echo "$bad"
            exit 1
          fi

      - name: Check file sizes (100 KB limit)
        run: |
          LIMIT=102400
          failed=0
          while IFS= read -r f; do
            size=$(stat -c%s "$f" 2>/dev/null || echo 0)
            if [ "$size" -gt "$LIMIT" ]; then
              echo "FAIL ($size bytes): $f"
              failed=1
            fi
          done < <(git ls-files)
          exit $failed

  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.12", "3.14"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system graphviz (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y graphviz

      - name: Install system graphviz (Windows)
        if: runner.os == 'Windows'
        run: choco install graphviz --no-progress

      - name: Add graphviz to PATH (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo "C:/Program Files/Graphviz/bin" >> "$GITHUB_PATH"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v

  publish:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: [checks, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write  # needed to push the version tag

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # fetch full history so we can check existing tags

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Read version from pyproject.toml
        id: version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check whether this version tag already exists
        id: tag_check
        run: |
          if git rev-parse --verify "refs/tags/${{ steps.version.outputs.tag }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build wheel and sdist
        if: steps.tag_check.outputs.exists == 'false'
        run: pip install build && python -m build

      - name: Publish to PyPI
        if: steps.tag_check.outputs.exists == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Create and push version tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
