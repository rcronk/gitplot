<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GitPlot</title>
  <style>
    body { margin: 0; background: #1e1e1e; display: flex; flex-direction: column; height: 100vh; }
    #status { background: #333; color: #aaa; padding: 4px 8px; font: 12px monospace; flex-shrink: 0; }
    #container { flex: 1; overflow: auto; display: flex; align-items: center; justify-content: center; padding: 8px; }
  </style>
</head>
<body>
  <div id="status">Connecting to gitplot...</div>
  <div id="container"></div>
  <script>
    const SVG = '{{SVG_FILENAME}}';
    let seq = 0;
    let displayed = null;

    function refresh() {
      const c = document.getElementById('container');
      const next = new Image();
      next.style.cssText = 'max-width:100%;max-height:100%;';

      next.onload = function () {
        // next is already fully loaded in memory; replaceChild/appendChild
        // moves it into #container atomically so the old SVG stays visible
        // right up to the moment the new one appears — no blank frame.
        if (displayed) {
          c.replaceChild(next, displayed);
        } else {
          c.appendChild(next);
        }
        displayed = next;
        document.getElementById('status').textContent =
          'Updated: ' + new Date().toLocaleTimeString();
        setTimeout(refresh, 1000);
      };

      next.onerror = function () {
        setTimeout(refresh, 1000);
      };

      next.src = SVG + '?t=' + (++seq);
    }

    refresh();
  </script>
</body>
</html>
